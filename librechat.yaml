version: 1.3.5
cache: true
interface:
  mcpServers:
    use: true
    create: true
    share: false
    public: false
    configureObo: false
speech:
  tts:
    openai:
      url: 'http://tts_api:8880/v1/audio/speech'
      apiKey: 'local'
      model: 'kokoro'
      voices: ['af_heart', 'af_bella', 'af_sky', 'af_nicole', 'am_adam', 'am_michael', 'bf_emma', 'bf_isabella', 'bm_george', 'bm_lewis']
  stt:
    openai:
      url: 'http://stt_api:8000/v1/audio/transcriptions'
      apiKey: 'local'
      model: 'Systran/faster-whisper-large-v3'
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  maxInputTokens: 12000
  messageWindowSize: 5
  agent:
    provider: 'OpenRouter'
    model: 'deepseek/deepseek-v4-flash'
webSearch:
  searchProvider: 'tavily'
  tavilyApiKey: '${TAVILY_API_KEY}'
  scraperProvider: 'firecrawl'
  firecrawlApiKey: '${FIRECRAWL_API_KEY}'
mcpSettings:
  allowedAddresses:
    - 'mcp-image-gen:8000'
#mcpServers:
#  image-gen:
#    type: streamable-http
#    url: 'http://mcp-image-gen:8000/mcp'
#    timeout: 180000
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["minimax/minimax-m2.7"]
        fetch: true
      titleConvo: true
      titleModel: "minimax/minimax-m2.7"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"
    - name: "Ollama"
      apiKey: "sk-ollama"
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        default: ["qwen3.6:27b"]
        fetch: true
      modelDisplayLabel: "Ollama"
      titleConvo: true
      titleModel: "current_model" # Reuses current model for title generation
      summarize: false
