version: 1.3.5
cache: true
interface:
  mcpServers:
    use: true
    create: true
    share: false
    public: false
    configureObo: false
speech:
  tts:
    openai:
      url: 'http://tts_api:8880/v1/audio/speech'
      apiKey: 'local'
      model: 'kokoro'
      voices: ['af_heart', 'af_bella', 'af_sky', 'af_nicole', 'am_adam', 'am_michael', 'bf_emma', 'bf_isabella', 'bm_george', 'bm_lewis']
  stt:
    openai:
      url: 'http://stt_api:8000/v1/audio/transcriptions'
      apiKey: 'local'
      model: 'Systran/faster-whisper-large-v3'
memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  maxInputTokens: 12000
  messageWindowSize: 5
  agent:
    provider: 'OpenRouter'
    model: 'deepseek/deepseek-v4-flash'
webSearch:
  searchProvider: 'tavily'
  tavilyApiKey: '${TAVILY_API_KEY}'
  tavilySearchOptions:
    searchDepth: 'basic'
    maxResults: 5
    topic: 'general'
    includeAnswer: false
    includeRawContent: false
    # timeRange: 'week'
    # includeDomains: []
    # excludeDomains: []
    timeout: 15000
  scraperProvider: 'firecrawl'
  firecrawlApiKey: '${FIRECRAWL_API_KEY}'
  firecrawlOptions:
    formats: ['markdown']
    onlyMainContent: true
    blockAds: true
    removeBase64Images: true
    timeout: 7500
    # waitFor: 0
    # mobile: false
    # parsePDF: false
  rerankerType: 'none'
  scraperTimeout: 7500
  safeSearch: 1
mcpSettings:
  allowedAddresses:
    - 'mcp-image-gen:8000'
#mcpServers:
#  image-gen:
#    type: streamable-http
#    url: 'http://mcp-image-gen:8000/mcp'
#    timeout: 180000
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["deepseek/deepseek-v4-flash"]
        fetch: true
      titleConvo: true
      titleModel: "deepseek/deepseek-v4-flash"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"
